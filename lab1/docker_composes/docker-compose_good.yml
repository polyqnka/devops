version: "3.8"

services:
  minecraft:
    image: itzg/minecraft-server:java17
    container_name: mc-server
    restart: unless-stopped
    platform: linux/amd64  
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      MEMORY: "3G"
      TYPE: "PAPER"
      ENABLE_RCON: "true"
      RCON_PASSWORD: ${RCON_PASSWORD}
    volumes:
      - ./server:/data
    mem_limit: 4g
    cpus: "1.5"
    networks:
      - mcnet
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "25565"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   

  backend:
    build: ./backend
    container_name: mc-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MC_HOST: mc-server  
      MC_PORT: 25565
    networks:
      - backendnet
    depends_on:
      minecraft:
        condition: service_healthy

networks:
  mcnet:
    driver: bridge
  backendnet:
    driver: bridge